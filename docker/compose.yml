services:
  database:
    image: postgres
    restart: always
    shm_size: 128mb
    volumes:
      - db:/var/lib/postgresql
      - ./init-db-scripts:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: giovanny
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: go-crud-sql
    ports:
      - "5432:5432"

volumes:
  db:
    driver: local